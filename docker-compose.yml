version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: control-migratorio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: control_migratorio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d control_migratorio']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
